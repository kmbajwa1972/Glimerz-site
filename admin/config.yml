backend:
  name: github
  repo: kmbajwa1972/Glimerz-site
  branch: main
  base_url: https://decapcms.org

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Post Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Image (Upload from PC)", name: "image", widget: "image"}
      - {label: "Amazon Video Embed Link (Optional)", name: "video", widget: "string", required: false}
      - {label: "Blog Content & Affiliate Links", name: "body", widget: "markdown"}

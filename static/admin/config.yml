backend:
  name: git-gateway
  repo: kmbajwa1972/Glimerz-site
  branch: main
  auth_type: pkce
  base_url: https://decapbridge.com
  auth_endpoint: /sites/087b36a3-18d5-48e4-ae18-5bcb264a8d9f/pkce
  auth_token_endpoint: /sites/087b36a3-18d5-48e4-ae18-5bcb264a8d9f/token
  gateway_url: https://decapbridge.com

logo_url: /images/logo.jpg
site_url: https://glimerz.com

# These must match Hugo's real static pipeline (static/ -> public/ on build),
# otherwise uploaded images/videos never make it into the live site.
media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Post Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "SEO Description", name: "description", widget: "text", required: false, hint: "Shown in Google search results and social shares. ~160 characters. Leave blank to auto-generate from post content."}
      - {label: "Featured Image", name: "image", widget: "image"}
      - {label: "Blog Content", name: "body", widget: "markdown"}
      - label: "Products"
        name: "products"
        widget: "list"
        collapsed: true
        summary: "{{fields.product_name}}"
        required: false
        fields:
          - {label: "Product Name", name: "product_name", widget: "string"}
          - {label: "Amazon Affiliate Link", name: "affiliate_link", widget: "string", hint: "Full Amazon product/affiliate URL"}
          - {label: "Product Photo", name: "photo", widget: "image", required: false}
          - {label: "Video Link (YouTube or Vimeo URL)", name: "video_url", widget: "string", required: false, hint: "Paste a YouTube or Vimeo link. Leave blank if uploading a video file below."}
          - label: "Or Upload Video File"
            name: "video_file"
            widget: "file"
            required: false
            media_folder: "static/videos"
            public_folder: "/videos"
            hint: "Upload an mp4 directly. Leave blank if using a video link above."

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Glimerz — AI Manager</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>
<style>
  :root {
    --cream: #fdfbf7;
    --surface: #ffffff;
    --border: #e5ddd0;
    --ink: #2c2c2c;
    --muted: #7a7a7a;
    --gold: #aa8453;
    --gold-deep: #8a6a41;
    --sage: #7a8b6f;
    --sage-deep: #5f6e56;
    --rust: #b5573f;
    --rust-deep: #954632;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .brand {
    font-family: Georgia, serif;
    font-weight: 400;
  }

  /* ---------- Login screen ---------- */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .login-card h1 {
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--gold);
    margin: 0 0 4px;
    font-weight: 400;
  }

  .login-card p.sub {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    margin: 0 0 28px;
  }

  input[type="email"], input[type="password"], textarea {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 0.95rem;
    background: var(--cream);
    color: var(--ink);
    font-family: inherit;
  }

  input:focus, textarea:focus, button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }

  .login-card input { margin-bottom: 12px; }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 3px;
    font-size: 0.9rem;
    padding: 10px 18px;
  }

  .btn-primary {
    background: var(--gold);
    color: #fff;
    width: 100%;
    padding: 12px;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: var(--gold-deep); }

  #login-error {
    color: var(--rust-deep);
    font-size: 0.85rem;
    margin-top: 14px;
    min-height: 1em;
  }

  /* ---------- App shell ---------- */
  #app { display: none; }

  header.top {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header.top h1 {
    font-size: 1.5rem;
    letter-spacing: 1px;
    color: var(--gold);
    margin: 0;
  }
  header.top .status-line {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .signout-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .signout-btn:hover { color: var(--ink); border-color: var(--muted); }

  nav.tabs {
    display: flex;
    gap: 4px;
    padding: 0 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  nav.tabs button {
    background: transparent;
    color: var(--muted);
    padding: 14px 4px;
    margin-right: 28px;
    border-radius: 0;
    border-bottom: 2px solid transparent;
    font-size: 0.9rem;
  }
  nav.tabs button.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
  }

  main { max-width: 920px; margin: 0 auto; padding: 32px; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-style: italic;
  }

  /* ---------- Content cards ---------- */
  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    border-radius: 3px;
    padding: 20px 22px;
    margin-bottom: 18px;
  }

  .item-card.type-blog_post { border-left-color: var(--gold); }
  .item-card.type-pinterest_pin { border-left-color: #c8232c; }
  .item-card.type-facebook_post { border-left-color: #1877f2; }
  .item-card.type-instagram_post { border-left-color: #c1358f; }

  .item-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .item-title-input {
    width: 100%;
    font-size: 1.1rem;
    font-family: Georgia, serif;
    border: 1px solid transparent;
    background: transparent;
    padding: 4px 6px;
    margin-bottom: 8px;
    border-radius: 3px;
  }
  .item-title-input:hover, .item-title-input:focus { border-color: var(--border); background: var(--cream); }

  .item-title-display {
    font-size: 1.1rem;
    font-family: Georgia, serif;
    padding: 4px 6px;
    margin-bottom: 8px;
  }
  .item-body-display {
    font-size: 0.92rem;
    line-height: 1.6;
    padding: 4px 6px;
    white-space: pre-wrap;
  }

  .btn-edit { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-edit:hover { color: var(--ink); border-color: var(--muted); }

  .item-body-textarea {
    width: 100%;
    min-height: 140px;
    font-size: 0.92rem;
    line-height: 1.6;
    resize: vertical;
  }

  .item-thumb {
    max-width: 140px;
    border-radius: 3px;
    border: 1px solid var(--border);
    display: block;
    margin: 10px 0;
  }

  .item-link {
    font-size: 0.82rem;
    color: var(--gold);
    text-decoration: none;
  }
  .item-link:hover { text-decoration: underline; }

  .item-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .btn-approve { background: var(--sage); color: #fff; }
  .btn-approve:hover { background: var(--sage-deep); }
  .btn-reject { background: transparent; color: var(--rust-deep); border: 1px solid var(--rust); }
  .btn-reject:hover { background: var(--rust); color: #fff; }
  .btn-save { background: transparent; color: var(--gold-deep); border: 1px solid var(--gold); }
  .btn-save:hover { background: var(--gold); color: #fff; }

  .save-hint {
    font-size: 0.78rem;
    color: var(--muted);
    align-self: center;
    margin-left: auto;
  }

  /* ---------- Activity log ---------- */
  .log-row {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .log-row:last-child { border-bottom: none; }
  .log-time { color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .log-action { font-weight: 600; }
  .log-level-error .log-action { color: var(--rust-deep); }
  .log-level-warning .log-action { color: var(--gold-deep); }
  .log-details { color: var(--muted); font-size: 0.82rem; word-break: break-word; }

  @media (max-width: 640px) {
    header.top, nav.tabs, main { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <div class="login-card">
    <h1 class="brand">Glimerz</h1>
    <p class="sub">AI Manager</p>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email" autocomplete="username" required />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" class="btn-primary">Sign in</button>
    </form>
    <div id="login-error"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <header class="top">
    <h1 class="brand">Glimerz AI Manager</h1>
    <div class="status-line" id="status-line">Loading…</div>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="pending">Pending review</button>
    <button class="tab-btn" data-tab="rejected">Rejected</button>
    <button class="tab-btn" data-tab="log">Activity log</button>
  </nav>

  <main>
    <div id="pending-panel"></div>
    <div id="rejected-panel" style="display:none;"></div>
    <div id="log-panel" style="display:none;"></div>
  </main>
</div>

<script>
// ============================================================
// Configuration — fill these in before deploying.
// The anon key is safe to expose client-side: Row Level Security
// on the database is what actually enforces access, not this key.
// ============================================================
const SUPABASE_URL = "https://yayljmqelmsmcsuhxqdj.supabase.co"; // e.g. https://yayljmqelmsmcsuhxqdj.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheWxqbXFlbG1zbWNzdWh4cWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3ODUyOTMsImV4cCI6MjA5OTM2MTI5M30.XITDKls3bKtsXVssJuGQvy8iE4gwl2VtDF1F3dbrDcs";

if (SUPABASE_URL.startsWith("YOUR_") || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
  document.getElementById("login-screen").innerHTML =
    '<div class="login-card"><h1 class="brand">Glimerz</h1>' +
    '<p style="color:#b5573f;font-size:0.9rem;">Setup incomplete: SUPABASE_URL and SUPABASE_ANON_KEY are still placeholder values in index.html. Fill them in from Supabase → Project Settings → API, then reload this page.</p></div>';
  throw new Error("Dashboard not configured: SUPABASE_URL / SUPABASE_ANON_KEY are still placeholders.");
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ITEM_TYPE_LABELS = {
  blog_post: "Blog post",
  pinterest_pin: "Pinterest pin",
  facebook_post: "Facebook post",
  instagram_post: "Instagram post",
};

// ---------------------------------------------------------------
// Auth
// ---------------------------------------------------------------
async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadPending();
}

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errorEl = document.getElementById("login-error");
  errorEl.textContent = "";

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = "Sign-in failed — check your email and password.";
    return;
  }
  showApp();
});

document.getElementById("signout-btn").addEventListener("click", async () => {
  await sb.auth.signOut();
  showLogin();
});

// ---------------------------------------------------------------
// Tabs
// ---------------------------------------------------------------
document.querySelectorAll(".tab-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("pending-panel").style.display = tab === "pending" ? "block" : "none";
    document.getElementById("rejected-panel").style.display = tab === "rejected" ? "block" : "none";
    document.getElementById("log-panel").style.display = tab === "log" ? "block" : "none";
    if (tab === "rejected") loadRejected();
    if (tab === "log") loadLog();
  });
});

// ---------------------------------------------------------------
// Pending review panel
// ---------------------------------------------------------------
async function loadPending() {
  const panel = document.getElementById("pending-panel");
  panel.innerHTML = `<p class="empty-state">Loading…</p>`;

  const { data, error } = await sb
    .from("content_items")
    .select("*")
    .eq("status", "pending_review")
    .order("created_at", { ascending: false });

  if (error) {
    panel.innerHTML = `<p class="empty-state">Couldn't load items: ${escapeHtml(error.message)}</p>`;
    return;
  }

  document.getElementById("status-line").textContent =
    data.length === 0 ? "Nothing waiting on you right now" : `${data.length} item${data.length === 1 ? "" : "s"} waiting for review`;

  if (data.length === 0) {
    panel.innerHTML = `<p class="empty-state">No pending items. The next scheduled run will add more here.</p>`;
    return;
  }

  panel.innerHTML = "";
  for (const item of data) {
    panel.appendChild(renderItemCard(item));
  }
}

function renderItemCard(item) {
  const card = document.createElement("div");
  card.className = `item-card type-${item.item_type}`;
  card.dataset.id = item.id;

  const thumb = (item.media_urls && item.media_urls[0])
    ? `<img class="item-thumb" src="${escapeAttr(item.media_urls[0])}" alt="" />`
    : "";

  const sourceLink = item.source_post_url
    ? `<a class="item-link" href="${escapeAttr(item.source_post_url)}" target="_blank" rel="noopener">View source post →</a>`
    : "";

  card.innerHTML = `
    <div class="item-meta">
      <span>${ITEM_TYPE_LABELS[item.item_type] || item.item_type}</span>
      <span>${new Date(item.created_at).toLocaleString()}</span>
    </div>
    <div class="view-mode">
      <div class="item-title-display">${escapeHtml(item.title || "")}</div>
      <div class="item-body-display">${escapeHtml(item.body || "")}</div>
    </div>
    <div class="edit-mode" style="display:none;">
      <input class="item-title-input" value="${escapeAttr(item.title || "")}" />
      <textarea class="item-body-textarea">${escapeHtml(item.body || "")}</textarea>
    </div>
    ${thumb}
    ${sourceLink}
    <div class="item-actions">
      <button class="btn-edit">Edit</button>
      <button class="btn-save" style="display:none;">Save edits</button>
      <button class="btn-approve">Approve</button>
      <button class="btn-reject">Reject</button>
      <span class="save-hint"></span>
    </div>
  `;

  const viewMode = card.querySelector(".view-mode");
  const editMode = card.querySelector(".edit-mode");
  const editBtn = card.querySelector(".btn-edit");
  const saveBtn = card.querySelector(".btn-save");

  editBtn.addEventListener("click", () => {
    viewMode.style.display = "none";
    editMode.style.display = "block";
    editBtn.style.display = "none";
    saveBtn.style.display = "inline-block";
    card.querySelector(".item-title-input").focus();
  });

  saveBtn.addEventListener("click", async () => {
    await saveEdits(item.id, card);
    const newTitle = card.querySelector(".item-title-input").value;
    const newBody = card.querySelector(".item-body-textarea").value;
    card.querySelector(".item-title-display").textContent = newTitle;
    card.querySelector(".item-body-display").textContent = newBody;
    viewMode.style.display = "block";
    editMode.style.display = "none";
    editBtn.style.display = "inline-block";
    saveBtn.style.display = "none";
  });

  card.querySelector(".btn-approve").addEventListener("click", () => approveItem(item.id, card));
  card.querySelector(".btn-reject").addEventListener("click", () => rejectItem(item.id, card));

  return card;
}

async function saveEdits(id, card) {
  const title = card.querySelector(".item-title-input").value;
  const body = card.querySelector(".item-body-textarea").value;
  const hint = card.querySelector(".save-hint");

  const { error } = await sb.from("content_items").update({ title, body, updated_at: new Date().toISOString() }).eq("id", id);
  hint.textContent = error ? "Save failed" : "Saved";
  setTimeout(() => { hint.textContent = ""; }, 2000);
}

async function approveItem(id, card) {
  const approveBtn = card.querySelector(".btn-approve");
  const hint = card.querySelector(".save-hint");

  // Save any in-progress edits first, so what gets published matches
  // what's on screen.
  await saveEdits(id, card);

  approveBtn.disabled = true;
  approveBtn.textContent = "Publishing…";
  hint.textContent = "";

  // Mark reviewed, then hand off to the publish function. The function
  // itself flips status to 'published' or 'publish_failed' when it's done.
  await sb.from("content_items").update({ status: "approved", reviewed_at: new Date().toISOString() }).eq("id", id);

  const { data, error } = await sb.functions.invoke("publish-item", { body: { id } });

  if (error || (data && data.success === false)) {
    const message = (data && data.error) || error?.message || "Unknown error";
    hint.textContent = "";
    approveBtn.disabled = false;
    approveBtn.textContent = "Approve";
    alert(`Publishing failed: ${message}\n\nThe item has been marked "publish_failed" — check the Activity log tab for details. It's no longer in this pending list; you can find and retry it directly in Supabase if needed.`);
    card.remove();
    refreshStatusLine();
    return;
  }

  approveBtn.textContent = "Published ✓";
  card.remove();
  refreshStatusLine();
}

async function rejectItem(id, card) {
  const note = prompt("Optional note on why this is rejected (or leave blank):", "");
  const { error } = await sb.from("content_items").update({
    status: "rejected",
    reviewed_at: new Date().toISOString(),
    review_note: note || null,
  }).eq("id", id);

  if (error) {
    alert("Reject failed: " + error.message);
    return;
  }
  card.remove();
  refreshStatusLine();
}

function refreshStatusLine() {
  const remaining = document.querySelectorAll("#pending-panel .item-card").length;
  document.getElementById("status-line").textContent =
    remaining === 0 ? "Nothing waiting on you right now" : `${remaining} item${remaining === 1 ? "" : "s"} waiting for review`;
  if (remaining === 0) {
    document.getElementById("pending-panel").innerHTML = `<p class="empty-state">No pending items. The next scheduled run will add more here.</p>`;
  }
}

// ---------------------------------------------------------------
// Rejected panel
// ---------------------------------------------------------------
async function loadRejected() {
  const panel = document.getElementById("rejected-panel");
  panel.innerHTML = `<p class="empty-state">Loading…</p>`;

  const { data, error } = await sb
    .from("content_items")
    .select("*")
    .eq("status", "rejected")
    .order("reviewed_at", { ascending: false });

  if (error) {
    panel.innerHTML = `<p class="empty-state">Couldn't load rejected items: ${escapeHtml(error.message)}</p>`;
    return;
  }

  if (data.length === 0) {
    panel.innerHTML = `<p class="empty-state">Nothing rejected so far.</p>`;
    return;
  }

  panel.innerHTML = "";
  for (const item of data) {
    panel.appendChild(renderRejectedCard(item));
  }
}

function renderRejectedCard(item) {
  const card = document.createElement("div");
  card.className = `item-card type-${item.item_type}`;
  card.dataset.id = item.id;

  card.innerHTML = `
    <div class="item-meta">
      <span>${ITEM_TYPE_LABELS[item.item_type] || item.item_type}</span>
      <span>Rejected ${item.reviewed_at ? new Date(item.reviewed_at).toLocaleString() : ""}</span>
    </div>
    <div class="item-title-display" style="font-family:Georgia,serif; font-size:1.1rem; margin-bottom:6px;">${escapeHtml(item.title || "")}</div>
    <div class="item-body-display" style="font-size:0.92rem; line-height:1.6; color:var(--muted); white-space:pre-wrap;">${escapeHtml(item.body || "")}</div>
    ${item.review_note ? `<div style="margin-top:8px; font-size:0.8rem; color:var(--rust-deep);">Note: ${escapeHtml(item.review_note)}</div>` : ""}
    <div class="item-actions">
      <button class="btn-save">Restore to pending</button>
    </div>
  `;

  card.querySelector(".btn-save").addEventListener("click", () => restoreItem(item.id, card));

  return card;
}

async function restoreItem(id, card) {
  const { error } = await sb
    .from("content_items")
    .update({ status: "pending_review", reviewed_at: null, review_note: null })
    .eq("id", id);

  if (error) {
    alert("Restore failed: " + error.message);
    return;
  }
  card.remove();
  const remaining = document.querySelectorAll("#rejected-panel .item-card").length;
  if (remaining === 0) {
    document.getElementById("rejected-panel").innerHTML = `<p class="empty-state">Nothing rejected so far.</p>`;
  }
}

// ---------------------------------------------------------------
// Activity log panel
// ---------------------------------------------------------------
async function loadLog() {
  const panel = document.getElementById("log-panel");
  panel.innerHTML = `<p class="empty-state">Loading…</p>`;

  const { data, error } = await sb
    .from("activity_log")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(100);

  if (error) {
    panel.innerHTML = `<p class="empty-state">Couldn't load log: ${escapeHtml(error.message)}</p>`;
    return;
  }

  if (data.length === 0) {
    panel.innerHTML = `<p class="empty-state">No activity yet.</p>`;
    return;
  }

  panel.innerHTML = "";
  for (const row of data) {
    const el = document.createElement("div");
    el.className = `log-row log-level-${row.level}`;
    el.innerHTML = `
      <span class="log-time">${new Date(row.created_at).toLocaleString()}</span>
      <span>
        <div class="log-action">${escapeHtml(row.action)}</div>
        ${row.details ? `<div class="log-details">${escapeHtml(JSON.stringify(row.details))}</div>` : ""}
      </span>
    `;
    panel.appendChild(el);
  }
}

// ---------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}
function escapeAttr(str) {
  return (str ?? "").replace(/"/g, "&quot;");
}

checkSession();
</script>
</body>
</html>

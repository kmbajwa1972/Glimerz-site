<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.8; margin: 0; padding: 0; background: #fdfbf7; color: #2c2c2c; }
        .wrapper { max-width: 700px; margin: 60px auto; background: #fff; padding: 50px; box-shadow: 0 6px 20px rgba(170,132,83,0.04); border: 1px solid #f4f0ea; border-radius: 4px; }
        h1 { font-size: 2.4rem; line-height: 1.3; color: #2c2c2c; font-weight: 400; margin-top: 20px; }
        .meta { color: #8a8a8a; font-size: 0.9rem; font-style: italic; margin-bottom: 30px; }
        .feat-img { width: 100%; max-height: 450px; object-fit: cover; border-radius: 2px; margin-bottom: 30px; }
        .back-link { text-decoration: none; color: #aa8453; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        .content { font-size: 1.1rem; color: #3a3a3a; }
        .content a { color: #aa8453; font-weight: bold; text-decoration: underline; }
        .content a:hover { color: #2c2c2c; }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="/" class="back-link">← Back to Gallery</a>
        <h1>{{ .Title }}</h1>
        <div class="meta">Published on {{ .Date.Format "January 2, 2006" }}</div>
        
        <img class="feat-img" src="{{ .Params.image }}" alt="{{ .Title }}">

        <div class="content">
            {{ .Content }}
        </div>
    </div>

</body>
</html>

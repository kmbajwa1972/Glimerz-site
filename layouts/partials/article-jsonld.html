{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "description": {{ if .Params.description }}{{ .Params.description | jsonify }}{{ else }}{{ .Summary | plainify | truncate 160 | jsonify }}{{ end }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "wordCount": {{ .WordCount }},
  "image": [{{ if .Params.image }}{{ .Params.image | absURL | jsonify }}{{ else }}{{ "images/logo.jpg" | absURL | jsonify }}{{ end }}],
  "author": { "@type": "Organization", "name": "Glimerz", "url": "https://glimerz.com" },
  "publisher": {
    "@type": "Organization",
    "name": "Glimerz",
    "url": "https://glimerz.com",
    "logo": { "@type": "ImageObject", "url": {{ "images/logo.jpg" | absURL | jsonify }}, "width": 200, "height": 200 }
  },
  "mainEntityOfPage": { "@type": "WebPage", "@id": {{ .Permalink | jsonify }} },
  "url": {{ .Permalink | jsonify }}{{ if .Params.categories }},
  "keywords": {{ delimit .Params.categories ", " | jsonify }}{{ end }}
}
</script>
{{ else }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Glimerz",
  "url": "https://glimerz.com",
  "description": "Curated home decor and kitchen accessories inspiration, reviews, and product picks.",
  "publisher": { "@type": "Organization", "name": "Glimerz", "url": "https://glimerz.com" },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://glimerz.com/?s={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ end }}

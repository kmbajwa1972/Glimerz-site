<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glimerz Admin Workspace</title>
  
  <!-- Core Decap CMS Stylesheet and App Script via UNPKG CDN -->
  <link rel="stylesheet" href="https://unpkg.com@^3.0.0/dist/decap-cms.css" />
  <script src="https://unpkg.com@^3.0.0/dist/decap-cms.js"></script>
  
  <!-- Updated Configuration Block Provided by DecapBridge -->
  <script type="text/javascript">
    window.CMS_CONFIG = {
      backend: {
        name: 'git-gateway',
        repo: 'kmbajwa1972/Glimerz-site',
        branch: 'main',
        auth_type: 'pkce',
        base_url: 'https://auth.decapbridge.com',
        auth_endpoint: '/sites/087b36a3-18d5-48e4-ae18-5bcb264a8d9f/pkce',
        auth_token_endpoint: '/sites/087b36a3-18d5-48e4-ae18-5bcb264a8d9f/token',
        gateway_url: 'https://gateway.decapbridge.com',
        commit_messages: {
          create: 'Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge',
          update: 'Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge',
          delete: 'Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge',
          uploadMedia: 'Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge',
          deleteMedia: 'Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge',
          openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'
        }
      },
      auth: {
        email_claim: 'email',
        first_name_claim: 'first_name',
        last_name_claim: 'last_name',
        avatar_url_claim: 'avatar_url'
      },
      logo_url: 'https://decapbridge.com/decapcms-with-bridge.svg',
      site_url: 'https://github.io',
      media_folder: 'images',
      public_folder: '/images',
      collections: [{
        name: 'blog',
        label: 'Blog Posts',
        folder: '_posts',
        create: true,
        slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
        fields: [
          {label: 'Post Title', name: 'title', widget: 'string'},
          {label: 'Publish Date', name: 'date', widget: 'datetime'},
          {label: 'Featured Image (Upload from PC)', name: 'image', widget: 'image'},
          {label: 'Blog Content & Affiliate Links', name: 'body', widget: 'markdown'}
        ]
      }]
    };
  </script>
</head>
<body>
  <!-- Decap CMS UI Mount Target -->
</body>
</html>
